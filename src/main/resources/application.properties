# Nom de l'application
spring.application.name=${SPRING_APPLICATION_NAME:spring-cloud-azure-event-hub}

# Azure Event Hub
spring.cloud.azure.eventhubs.namespace=${EVENTHUB_NAMESPACE:ridene-eventhubs-namespace}
spring.cloud.azure.eventhubs.event-hub-name=${EVENTHUB_NAME:myeventhub}

# Checkpoint store (Azure Storage)
spring.cloud.azure.eventhubs.processor.checkpoint-store.account-name=${STORAGE_ACCOUNT_NAME:ridenestorageaccount}
spring.cloud.azure.eventhubs.processor.checkpoint-store.container-name=${STORAGE_CONTAINER_NAME:eventhubcontainer}

# Consumer group
spring.cloud.azure.eventhubs.processor.consumer-group=${CONSUMER_GROUP:$Default}
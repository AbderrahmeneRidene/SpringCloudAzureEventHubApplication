<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Azure Event Hub - Événements en temps réel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        #events { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1>Événements reçus depuis Azure Event Hub</h1>

    <!-- Liste des événements -->
    <ul class="list-group mt-3" id="events">
        <li class="list-group-item" th:each="event : ${initialEvents}" 
            th:text="${event.body}"></li>
    </ul>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const eventList = document.getElementById('events');
    const eventSource = new EventSource('/events');

    eventSource.onmessage = function(event) {
        const data = JSON.parse(event.data);

        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.innerHTML = `
            <strong>Partition:</strong> ${data.partition} <br>
            <strong>Sequence:</strong> ${data.sequence} <br>
            <strong>Timestamp:</strong> ${data.enqueuedTime} <br>
            <strong>Body:</strong> ${data.body}
        `;

        if (eventList.firstChild) {
            eventList.insertBefore(li, eventList.firstChild);
        } else {
            eventList.appendChild(li);
        }
    };

    eventSource.onerror = function(err) {
        console.error("Erreur SSE", err);
    };
});
</script>
</body>
</html>
